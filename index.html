<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Acceso PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  transition: background 0.5s;
}

.card {
  text-align: center;
  padding: 30px;
  border-radius: 20px;
  background: #111;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 0 30px rgba(0,0,0,0.8);
}

.logo {
  width: 120px;
  margin-bottom: 10px;
}

.estado {
  font-size: 28px;
  font-weight: bold;
}

.nombre {
  font-size: 22px;
  margin-top: 10px;
}

.puesto {
  color: #ccc;
}

.id {
  font-size: 14px;
  color: #777;
}

.ok {
  color: #00ff88;
}

.bad {
  color: red;
}

@keyframes pulse {
  0% { transform: scale(1);}
  50% { transform: scale(1.05);}
  100% { transform: scale(1);}
}

.anim {
  animation: pulse 0.5s;
}
</style>
</head>

<body>

<div class="card" id="card">
  <img src="logo.png" class="logo" onerror="this.style.display='none'">
  <div id="resultado">🔍 Verificando...</div>
</div>

<script>
// 🔐 BASE DE DATOS
const usuarios = {
  "STAFF001": { nombre: "Jonas Flores Mahla", puesto: "Auxiliar de iluminación", estado: "activo" },
  "STAFF002": { nombre: "Josué Flores Mahla", puesto: "Ingeniero de iluminación", estado: "activo" },
  "STAFF003": { nombre: "Luis Pérez Herrera", puesto: "Ingeniero de video", estado: "activo" },
  "STAFF004": { nombre: "Armando Barrera Salas", puesto: "Audio", estado: "activo" },
  "STAFF005": { nombre: "Guillermo Andrés Barra", puesto: "Ingeniero de Audio", estado: "activo" },
  "STAFF006": { nombre: "Leandro Salazar Freigman", puesto: "Ingeniero de Video", estado: "activo" }
};

// 🔊 SONIDOS
function beepOK() {
  let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
  audio.play();
}

function beepBAD() {
  let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-10.mp3");
  audio.play();
}

// 🔍 OBTENER ID
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const resultado = document.getElementById("resultado");
const card = document.getElementById("card");

// 💾 BLOQUEO LOCAL (anti doble escaneo básico)
let usados = JSON.parse(localStorage.getItem("usados") || "[]");

setTimeout(() => {

if (usuarios[id]) {

  if (usados.includes(id)) {
    resultado.innerHTML = `<div class="estado bad">❌ YA REGISTRADO</div>`;
    document.body.style.background = "#300";
    beepBAD();
  }

  else {
    resultado.innerHTML = `
      <div class="estado ok anim">✅ ACCESO APROBADO</div>
      <div class="nombre">${usuarios[id].nombre}</div>
      <div class="puesto">${usuarios[id].puesto}</div>
      <div class="id">${id}</div>
    `;
    
    document.body.style.background = "#002b00";
    beepOK();

    usados.push(id);
    localStorage.setItem("usados", JSON.stringify(usados));
  }

} else {
  resultado.innerHTML = `<div class="estado bad">❌ ID NO ENCONTRADO</div>`;
  document.body.style.background = "#300";
  beepBAD();
}

}, 700);
</script>

</body>
</html>
